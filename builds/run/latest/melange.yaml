package:
  name: ca-certs-custom
  version: 1.0.0
  epoch: 0
  description: "Bundle de certificados CA customizados para imagens distroless Golang"
  target-architecture:
    - x86_64
    - aarch64
  copyright:
    - license: Apache-2.0

environment:
  contents:
    repositories:
      - https://packages.wolfi.dev/os
    keyring:
      - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
    packages:
      - busybox
      - ca-certificates
      - ca-certificates-bundle
      # openssl necessário para validar e inspecionar cada certificado extraído
      - openssl

pipeline:
  # ── Step 1: faz o split dos ca_bundles em certificados individuais ──────────
  # Aceita arquivos .pem ou .crt contendo um ou múltiplos certificados
  # concatenados (formato bundle). Cada certificado é extraído para um
  # arquivo .crt individual em /usr/local/share/ca-certificates/ usando
  # o Subject CN como nome de arquivo, garantindo que update-ca-certificates
  # os processe corretamente.
  - name: split-ca-bundles
    runs: |
      set -euo pipefail

      # Melange pode executar com cwd diferente entre ambientes.
      # Detectamos automaticamente o diretório de certificados.
      if [ -d "certificates" ]; then
        CERT_DIR="certificates"
      elif [ -d "builds/golang/1.25/certificates" ]; then
        CERT_DIR="builds/golang/1.25/certificates"
      else
        CERT_DIR=""
      fi

      STAGING="/usr/local/share/ca-certificates"

      mkdir -p "$STAGING"

      if [ -z "$CERT_DIR" ]; then
        echo "AVISO: diretório de certificados não encontrado — usando apenas CAs Wolfi"
        exit 0
      fi

      found_any=0
      for bundle in "$CERT_DIR"/*.pem "$CERT_DIR"/*.crt; do
        [ -e "$bundle" ] || continue
        found_any=1
        bundle_name=$(basename "$bundle" | sed 's/\.[^.]*$//')
        echo "-> Processando bundle: $bundle_name"

        # Extrai cada certificado PEM do bundle usando awk
        # Gera arquivos: <bundle_name>-1.crt, <bundle_name>-2.crt, ...
        awk \
          -v name="$bundle_name" \
          -v dir="$STAGING" '
          /-----BEGIN CERTIFICATE-----/ {
            n++
            outfile = dir "/" name "-" n ".crt"
          }
          outfile { print > outfile }
          /-----END CERTIFICATE-----/ {
            close(outfile)
            outfile = ""
          }
        ' "$bundle"

        # Conta e valida os certificados extraídos deste bundle
        set -- "$STAGING/${bundle_name}"-*.crt
        if [ ! -e "$1" ]; then
          echo "ERRO: nenhum certificado foi extraído do bundle $bundle_name"
          exit 1
        fi

        extracted=0
        for cert in "$@"; do
          extracted=$((extracted + 1))
          if ! openssl x509 -in "$cert" -noout 2>/dev/null; then
            echo "ERRO: certificado inválido extraído: $cert"
            exit 1
          fi
          subject=$(openssl x509 -in "$cert" -noout -subject 2>/dev/null | sed 's/subject=//')
          echo "   -> OK: $subject"
        done

        echo "   Extraídos: ${extracted} certificado(s) de $bundle_name"
      done

      if [ "$found_any" -eq 0 ]; then
        echo "AVISO: nenhum bundle .pem/.crt encontrado em $CERT_DIR — usando apenas CAs Wolfi"
      fi

  # ── Step 2: instala apenas os certs extras no DESTDIR ───────────────────────
  # Nao empacotamos /etc/ssl/certs/ca-certificates.crt para evitar conflito
  # com o pacote oficial ca-certificates-bundle no APKO. O bundle oficial
  # continua sendo fornecido pelo Wolfi, e este pacote adiciona apenas os CAs
  # extras em caminhos exclusivos.
  - name: install-to-destdir
    runs: |
      set -euo pipefail

      DEST="${{targets.destdir}}"

      mkdir -p "${DEST}/usr/local/share/ca-certificates"
      mkdir -p "${DEST}/etc/ssl/certs/custom"

      # Instala os certificados individuais em paths exclusivos do pacote
      if ls /usr/local/share/ca-certificates/*.crt >/dev/null 2>&1; then
        cp /usr/local/share/ca-certificates/*.crt \
           "${DEST}/usr/local/share/ca-certificates/"
        cp /usr/local/share/ca-certificates/*.crt \
           "${DEST}/etc/ssl/certs/custom/"
      fi

      # Permissões corretas (read para todos, sem exec)
      find "${DEST}/usr/local/share/ca-certificates" \
           -name "*.crt" -exec chmod 644 {} \;
      find "${DEST}/etc/ssl/certs/custom" \
           -name "*.crt" -exec chmod 644 {} \;

  # ── Step 3: valida os certs extras instalados no DESTDIR ────────────────────
  - name: validate-bundle
    runs: |
      set -euo pipefail

      CUSTOM_COUNT=$(ls "${{targets.destdir}}/usr/local/share/ca-certificates"/*.crt \
                       2>/dev/null | wc -l | tr -d ' ')
      if [ "$CUSTOM_COUNT" -eq 0 ]; then
        echo "ERRO: nenhum certificado customizado foi empacotado"
        exit 1
      fi
      echo "Pacote validado: ${CUSTOM_COUNT} certificado(s) customizado(s) instalados"

